<!DOCTYPE html>
<html>
<head>
    <title>AI Code Reviewer</title>

    <style>
        /* ===== BODY ===== */
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        /* 🔥 Smaller container */
        .container {
            width: 500px;
            margin-top: 30px;
            background: white;
            padding: 18px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        /* Smaller heading */
        h1 {
            text-align: center;
            font-size: 22px;
            margin-bottom: 15px;
        }

        /* Smaller textarea */
        textarea {
            width: 100%;
            height: 120px;
            padding: 8px;
            font-family: monospace;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 13px;
        }

        /* Smaller button */
        button {
            margin-top: 10px;
            padding: 8px 14px;
            background: #1976d2;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }

        button:hover {
            background: #125ea7;
        }

        /* Compact result box */
        #result {
            margin-top: 15px;
            padding: 12px;
            background: #1e1e1e;
            color: #00ffcc;
            border-radius: 8px;
            font-size: 13px;
            max-height: 250px;   /* 🔥 prevents huge expansion */
            overflow-y: auto;    /* scroll instead of growing */
            white-space: pre-wrap;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🤖 AI Code Reviewer</h1>

    <textarea id="code" placeholder="Paste your code here..."></textarea>

    <button onclick="reviewCode()">Review Code</button>

    <div id="result"></div>

</div>

<script>
    async function reviewCode() {
        const code = document.getElementById("code").value;

        const response = await fetch("http://localhost:8080/api/review", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ code: code })
        });

        const data = await response.json();

        document.getElementById("result").innerHTML =
            data.result
                .replaceAll("\n", "<br>")
                .replaceAll("- ", "👉 ");
    }
</script>

</body>
</html>
